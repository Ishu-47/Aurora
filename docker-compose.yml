services:

  postgres:
    image: postgres:16
    container_name: aurora-postgres

    environment:
      POSTGRES_DB: socialmedia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: aurora-redis

    ports:
      - "6379:6379"

    restart: unless-stopped

    volumes:
      - redis_data:/data

  aurora-backend:
    image: aurora-backend
    container_name: aurora-backend

    ports:
      - "8080:8080"

    depends_on:
      - postgres
      - redis

    restart: unless-stopped

volumes:
  postgres_data:
  redis_data: